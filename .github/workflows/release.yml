name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build dashboard
        run: pnpm --filter @workers-sentinel/dashboard build

      - name: Run tests
        run: pnpm --filter workers-sentinel test

      - name: Get current version
        id: pre
        run: echo "version=$(jq -r .version packages/workers-sentinel/package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published
        id: check
        run: |
          VERSION="${{ steps.pre.outputs.version }}"
          if npm view "workers-sentinel@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: ${{ steps.check.outputs.published == 'false' && 'pnpm --filter workers-sentinel publish --provenance --access public --no-git-checks' || 'echo Already published, skipping' }}
          version: pnpm changeset version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(jq -r .version packages/workers-sentinel/package.json)
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
          else
            CHANGELOG_FILE="packages/workers-sentinel/CHANGELOG.md"
            BODY=""
            if [ -f "$CHANGELOG_FILE" ]; then
              BODY=$(awk "/^## ${VERSION}\$/{ found=1; next } /^## /{ if(found) exit } found" "$CHANGELOG_FILE")
            fi
            if [ -z "$BODY" ]; then
              BODY="See [CHANGELOG.md](https://github.com/G4brym/workers-sentinel/blob/main/packages/workers-sentinel/CHANGELOG.md) for details."
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$BODY" \
              --latest
            echo "Created release $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
